<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nginx Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    #statusChartContainer {

      width: 100%;
      position: relative;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 24px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 24px;
      color: #38bdf8;
    }

    h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #94a3b8;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
    }

    .card .value {
      font-size: 36px;
      font-weight: bold;
      color: #38bdf8;
    }

    .card .label {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .chart-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
    }

    .full-width {
      grid-column: span 2;
    }

    .range-btn {
      background: #334155;
      border: none;
      color: #e2e8f0;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .range-btn.active {
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>Nginx Monitor Dashboard</h1>

  <div class="summary">
    <div class="card">
      <div class="value" id="total-requests">...</div>
      <div class="label">Total Requests</div>
    </div>
    <div class="card">
      <div class="value" id="unique-ips">...</div>
      <div class="label">Unique IPs</div>
    </div>
    <div class="card">
      <div class="value" id="errors">...</div>
      <div class="label">Errors (4xx/5xx)</div>
    </div>
  </div>


  <div class="chart-card full-width" style="margin-bottom: 16px;">
    <h2>Search Logs</h2>
    <div style="display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap;">
      <input id="search-ip" type="text" placeholder="Search by IP..."
        style="flex:1; padding:8px 12px; background:#0f172a; border:1px solid #334155; border-radius:8px; color:#e2e8f0; min-width:150px;">
      <input id="search-url" type="text" placeholder="Search by URL..."
        style="flex:2; padding:8px 12px; background:#0f172a; border:1px solid #334155; border-radius:8px; color:#e2e8f0; min-width:200px;">
      <select id="search-status"
        style="padding:8px 12px; background:#0f172a; border:1px solid #334155; border-radius:8px; color:#e2e8f0;">
        <option value="">All Status Codes</option>
        <option value="200">200</option>
        <option value="301">301</option>
        <option value="307">307</option>
        <option value="400">400</option>
        <option value="404">404</option>
        <option value="500">500</option>
      </select>
      <input id="search-from" type="datetime-local"
        style="padding:8px 12px; background:#0f172a; border:1px solid #334155; border-radius:8px; color:#e2e8f0;">
      <input id="search-to" type="datetime-local"
        style="padding:8px 12px; background:#0f172a; border:1px solid #334155; border-radius:8px; color:#e2e8f0;">
      <button onclick="runSearch()"
        style="padding:8px 20px; background:#38bdf8; border:none; border-radius:8px; color:#0f172a; font-weight:bold; cursor:pointer;">
        Search
      </button>
      <button onclick="clearSearch()"
        style="padding:8px 20px; background:#334155; border:none; border-radius:8px; color:#e2e8f0; cursor:pointer;">
        Clear
      </button>
    </div>
    <table style="width:100%; border-collapse:collapse; font-size:13px;">
      <thead>
        <tr>
          <th style="text-align:left; padding:8px; color:#94a3b8; border-bottom:1px solid #334155;">IP</th>
          <th style="text-align:left; padding:8px; color:#94a3b8; border-bottom:1px solid #334155;">Time</th>
          <th style="text-align:left; padding:8px; color:#94a3b8; border-bottom:1px solid #334155;">Method</th>
          <th style="text-align:left; padding:8px; color:#94a3b8; border-bottom:1px solid #334155;">Path</th>
          <th style="text-align:left; padding:8px; color:#94a3b8; border-bottom:1px solid #334155;">Status</th>
          <th style="text-align:left; padding:8px; color:#94a3b8; border-bottom:1px solid #334155;">Size</th>
        </tr>
      </thead>
      <tbody id="search-results"></tbody>
    </table>
    <p id="search-count" style="margin-top:8px; color:#64748b; font-size:12px;"></p>
  </div>

  <div class="chart-card full-width" style="margin-bottom: 16px;">
    <h2>Error Breakdown</h2>
    <table style="width:100%; border-collapse: collapse;">
      <thead>
        <tr>
          <th style="text-align:left; padding: 8px; color:#94a3b8; border-bottom: 1px solid #334155;">Status Code</th>
          <th style="text-align:left; padding: 8px; color:#94a3b8; border-bottom: 1px solid #334155;">Count</th>
        </tr>
      </thead>
      <tbody id="error-table"></tbody>
    </table>
  </div>

  <div class="grid">
    <div class="chart-card full-width">

      <div
        style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:12px;">

        <h2>Traffic Over Time</h2>

        <input id="traffic-ip-search" type="text" placeholder="Search IP traffic..." style="
        padding:8px 12px;
        background:#0f172a;
        border:1px solid #334155;
        border-radius:8px;
        color:#e2e8f0;
        min-width:220px;
      " />

      </div>
      <canvas id="trafficChart"></canvas>

    </div>
    <div class="chart-card full-width">

      <div
        style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:12px;">

        <h2>Status Codes Over Time</h2>

        <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
          <button class="range-btn" data-range="minute">Minutes</button>
          <button class="range-btn active" data-range="hour">Hours</button>
          <button class="range-btn" data-range="day">Days</button>
          <input id="status-limit" type="number" value="60" min="10" max="1440"
            style="width:80px; padding:6px 10px; background:#0f172a; border:1px solid #334155; border-radius:8px; color:#e2e8f0;">
          <span style="color:#64748b; font-size:13px;">items</span>
          <span style="color:#64748b; font-size:13px;">items</span>
          <button id="scale-toggle" onclick="toggleScale()"
            style="padding:6px 14px; background:#334155; border:none; border-radius:8px; color:#e2e8f0; cursor:pointer;">
            Log Scale
          </button>
        </div>

      </div>

      <div style="overflow-x: auto;">
        <div id="statusChartContainer" style="min-width: 800px;">
          <canvas id="statusChart"></canvas>
        </div>
      </div>

    </div>
    <div class="chart-card">
      <h2>Top IPs</h2>
      <canvas id="ipChart"></canvas>
    </div>
    <div class="chart-card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <h2 style="color:#f87171;">IPs Over Threshold</h2>
        <div style="display:flex; align-items:center; gap:8px;">
          <input id="threshold-page-size" type="number" value="5" min="1" max="50"
            style="width:60px; padding:6px 10px; background:#0f172a; border:1px solid #334155; border-radius:8px; color:#e2e8f0;">
          <span style="color:#64748b; font-size:13px;">per page</span>
        </div>
      </div>
      <div id="threshold-table"></div>
    </div>
  </div>
  <div class="chart-card full-width" style="margin-top: 16px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <h2>System Logs</h2>
      <button onclick="loadSystemLogs()"
        style="padding:6px 14px; background:#334155; border:none; border-radius:8px; color:#e2e8f0; cursor:pointer;">
        Refresh
      </button>
    </div>
    <div id="system-logs" style="
      background:#0f172a;
      border-radius:8px;
      padding:16px;
      font-family:monospace;
      font-size:12px;
      max-height:300px;
      overflow-y:auto;
    "></div>
  </div>

  <script>
    const API = "";

    Chart.defaults.animation = false;

    function makeDataset(label, data, color, extra = {}) {
      return {
        label,
        data,
        borderColor: color,
        backgroundColor: color + "1a",
        parsing: false,
        normalized: true,
        pointRadius: 0,
        pointHoverRadius: 6,
        borderWidth: 2,
        tension: 0.4,
        ...extra,
      };
    }

    async function loadThresholdIPs() {
      const res = await fetch(`${API}/stats/anomalies`);
      const data = await res.json();
      const container = document.getElementById("threshold-table");

      if (data.high_frequency.length === 0) {
        container.innerHTML = `<p style="color:#34d399;">✓ No IPs over threshold</p>`;
        return;
      }

      const alerts = data.high_frequency.map(d => ({
        level: "red",
        message: `🚨 IP <strong>${d.ip}</strong> sent <strong>${d.count}</strong> requests at ${d.minute.replace("T", " ")}`
      }));

      const pageSize = parseInt(document.getElementById("threshold-page-size").value) || 5;
      let currentPage = 0;
      const totalPages = Math.ceil(alerts.length / pageSize);

      function renderPage(page) {
        const start = page * pageSize;
        const pageAlerts = alerts.slice(start, start + pageSize);
        container.innerHTML = pageAlerts.map(a => `
          <div style="padding:10px 16px;margin-bottom:8px;border-radius:8px;border-left:4px solid #f87171;background:rgba(248,113,113,0.1);color:#e2e8f0;font-size:14px;">${a.message}</div>
        `).join("");
        container.innerHTML += `
          <div style="display:flex;align-items:center;gap:12px;margin-top:12px;">
            <button onclick="thresholdPage(${page - 1})" ${page === 0 ? 'disabled' : ''}
              style="padding:6px 14px;background:#334155;border:none;border-radius:8px;color:#e2e8f0;cursor:pointer;opacity:${page === 0 ? 0.4 : 1};">← Prev</button>
            <span style="color:#64748b;font-size:13px;">Page ${page + 1} of ${totalPages} (${alerts.length} total)</span>
            <button onclick="thresholdPage(${page + 1})" ${page === totalPages - 1 ? 'disabled' : ''}
              style="padding:6px 14px;background:#334155;border:none;border-radius:8px;color:#e2e8f0;cursor:pointer;opacity:${page === totalPages - 1 ? 0.4 : 1};">Next →</button>
          </div>
        `;
      }

      window.thresholdPage = function (page) {
        if (page < 0 || page >= totalPages) return;
        currentPage = page;
        renderPage(currentPage);
      };

      renderPage(currentPage);
    }

    async function loadSummary() {
      const res = await fetch(`${API}/stats/summary`);
      const data = await res.json();
      document.getElementById("total-requests").textContent = data.total_requests.toLocaleString();
      document.getElementById("unique-ips").textContent = data.unique_ips.toLocaleString();
      document.getElementById("errors").textContent = data.errors.toLocaleString();
    }

    let trafficChart;

    async function loadTraffic(ip = "") {
      const res = await fetch(`${API}/stats/traffic?granularity=hour&ip=${ip}`);
      const data = await res.json();
      const points = data.map(d => ({ x: d.period.replace("T", " "), y: d.count }));

      if (trafficChart) {
        trafficChart.data.datasets[0].data = points;
        trafficChart.update("none");
        return;
      }

      trafficChart = new Chart(document.getElementById("trafficChart"), {
        type: "line",
        data: {
          datasets: [makeDataset("Requests", points, "#38bdf8", { fill: true })]
        },
        options: {
          parsing: false,
          normalized: true,
          animation: false,
          plugins: { legend: { labels: { color: "#e2e8f0" } } },
          scales: {
            x: { type: "category", ticks: { color: "#64748b", maxTicksLimit: 12 } },
            y: { beginAtZero: true, ticks: { color: "#64748b" } }
          }
        }
      });
    }

    let statusChart;
    let useLogScale = false;

    function toggleScale() {
      useLogScale = !useLogScale;
      document.getElementById("scale-toggle").style.background = useLogScale ? "#38bdf8" : "#334155";
      document.getElementById("scale-toggle").style.color = useLogScale ? "#0f172a" : "#e2e8f0";
      const activeRange = document.querySelector(".range-btn.active").dataset.range;
      loadStatusCodes(activeRange);
    }

    async function loadStatusCodes(range = "hour") {
      const thresholds = { minute: 10, hour: 100, day: 1200 };
      const res = await fetch(`${API}/stats/status-codes-over-time?granularity=${range}`);
      const data = await res.json();

      const limit = parseInt(document.getElementById("status-limit").value) || 60;
      if (data.labels.length > limit) {
        data.labels = data.labels.slice(-limit);
        data.datasets = data.datasets.map(d => ({ ...d, data: d.data.slice(-limit) }));
      }

      const colors = ["#38bdf8","#22c55e","#fbbf24","#f87171","#c084fc","#14b8a6","#f97316","#e11d48"];

      const datasets = data.datasets.map((dataset, index) => ({
        label: dataset.label,
        data: dataset.data.map(v => (v === null || v === undefined || v < 1) ? (useLogScale ? 0.1 : 0) : v),
        borderColor: colors[index % colors.length],
        parsing: false,
        normalized: true,
        tension: 0.4,
        pointRadius: 0,
        pointHoverRadius: 8,
        hitRadius: 10,
        borderWidth: 2,
        spanGaps: true,
      }));

      datasets.push({
        label: `Threshold (${thresholds[range]})`,
        data: new Array(data.labels.length).fill(thresholds[range]),
        borderColor: "#ff4d4f",
        borderDash: [8, 8],
        borderWidth: 2,
        pointRadius: 0,
        tension: 0,
      });

      const labels = data.labels.map(l => l.replace("T", " "));

      if (statusChart) {
        statusChart.data.labels = labels;
        statusChart.data.datasets = datasets;
        statusChart.options.scales.y.type = useLogScale ? "logarithmic" : "linear";
        statusChart.options.scales.y.min = useLogScale ? 0.09 : 0;
        statusChart.update("none");
        return;
      }

      const container = document.getElementById("statusChartContainer");
      const width = Math.max(data.labels.length * 25, container.parentElement.offsetWidth);
      container.style.width = width + "px";
      container.style.height = "400px";
      const canvas = document.getElementById("statusChart");
      canvas.width = width;
      canvas.height = 400;

      statusChart = new Chart(canvas, {
        type: "line",
        data: { labels, datasets },
        options: {
          responsive: false,
          animation: false,
          parsing: false,
          normalized: true,
          interaction: { mode: "point", intersect: true },
          plugins: {
            legend: { labels: { color: "#e2e8f0" } },
            tooltip: {
              backgroundColor: "#1e293b",
              titleColor: "#94a3b8",
              bodyColor: "#e2e8f0",
              borderColor: "#334155",
              borderWidth: 1,
              padding: 10,
              callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y}` }
            }
          },
          scales: {
            x: { ticks: { color: "#64748b", maxRotation: 45, minRotation: 45, autoSkip: false } },
            y: {
              type: useLogScale ? "logarithmic" : "linear",
              min: useLogScale ? 0.09 : 0,
              ticks: {
                color: "#64748b",
                callback: value => (useLogScale && value < 1) ? null : value
              }
            }
          }
        }
      });
    }

    async function loadTopIPs() {
      const res = await fetch(`${API}/stats/top-ips?limit=10`);
      const data = await res.json();

      new Chart(document.getElementById("ipChart"), {
        type: "bar",
        data: {
          labels: data.map(d => d.ip),
          datasets: [{ label: "Requests", data: data.map(d => d.count), backgroundColor: "#38bdf8" }]
        },
        options: {
          animation: false,
          indexAxis: "y",
          plugins: { legend: { labels: { color: "#e2e8f0" } } },
          scales: {
            x: { beginAtZero: true, ticks: { color: "#64748b" } },
            y: { ticks: { color: "#64748b" } }
          }
        }
      });
    }

    async function loadErrorBreakdown() {
      const res = await fetch(`${API}/stats/status-codes`);
      const data = await res.json();
      const errors = data.filter(d => d.status >= 400);
      document.getElementById("error-table").innerHTML = errors.map(d => `
        <tr>
          <td style="padding:8px;color:#f87171;">${d.status}</td>
          <td style="padding:8px;color:#e2e8f0;">${d.count.toLocaleString()}</td>
        </tr>
      `).join("");
    }

    async function loadAnomalies() {
      const res = await fetch(`${API}/stats/anomalies`);
      const data = await res.json();
      const alerts = [];

      data.high_frequency.forEach(d => alerts.push({
        level: "red",
        message: `🚨 IP <strong>${d.ip}</strong> sent <strong>${d.count}</strong> requests in 1 minute at ${d.minute.replace("T", " ")}`
      }));
      data.many_404s.forEach(d => alerts.push({
        level: "yellow",
        message: `⚠ IP <strong>${d.ip}</strong> triggered <strong>${d.count}</strong> 404 errors`
      }));
      data.many_500s.forEach(d => alerts.push({
        level: "red",
        message: `🔥 IP <strong>${d.ip}</strong> caused <strong>${d.count}</strong> server errors (500)`
      }));

      const container = document.getElementById("anomaly-list");
      if (!container) return;

      if (alerts.length === 0) {
        container.innerHTML = `<p style="color:#34d399;">✓ No anomalies detected</p>`;
        return;
      }

      let pageSize = parseInt(document.getElementById("anomaly-page-size")?.value) || 5;
      let currentPage = 0;
      const totalPages = Math.ceil(alerts.length / pageSize);

      function renderPage(page) {
        const pageAlerts = alerts.slice(page * pageSize, page * pageSize + pageSize);
        container.innerHTML = pageAlerts.map(a => `
          <div style="padding:10px 16px;margin-bottom:8px;border-radius:8px;border-left:4px solid ${a.level === 'red' ? '#f87171' : '#fbbf24'};background:${a.level === 'red' ? 'rgba(248,113,113,0.1)' : 'rgba(251,191,36,0.1)'};color:#e2e8f0;font-size:14px;">${a.message}</div>
        `).join("");
        container.innerHTML += `
          <div style="display:flex;align-items:center;gap:12px;margin-top:12px;">
            <button onclick="anomalyPage(${page - 1})" ${page === 0 ? 'disabled' : ''}
              style="padding:6px 14px;background:#334155;border:none;border-radius:8px;color:#e2e8f0;cursor:pointer;opacity:${page === 0 ? 0.4 : 1};">← Prev</button>
            <span style="color:#64748b;font-size:13px;">Page ${page + 1} of ${totalPages} (${alerts.length} total)</span>
            <button onclick="anomalyPage(${page + 1})" ${page === totalPages - 1 ? 'disabled' : ''}
              style="padding:6px 14px;background:#334155;border:none;border-radius:8px;color:#e2e8f0;cursor:pointer;opacity:${page === totalPages - 1 ? 0.4 : 1};">Next →</button>
          </div>
        `;
      }

      window.anomalyPage = function (page) {
        if (page < 0 || page >= totalPages) return;
        currentPage = page;
        renderPage(currentPage);
      };

      renderPage(currentPage);
    }

    async function runSearch() {
      const ip = document.getElementById("search-ip").value;
      const path = document.getElementById("search-url").value;
      const status = document.getElementById("search-status").value;
      const from = document.getElementById("search-from").value;
      const to = document.getElementById("search-to").value;

      let url = `${API}/stats/search?`;
      if (ip) url += `ip=${encodeURIComponent(ip)}&`;
      if (path) url += `path=${encodeURIComponent(path)}&`;
      if (status) url += `status=${status}&`;
      if (from) url += `time_from=${encodeURIComponent(from.replace("T", " "))}&`;
      if (to) url += `time_to=${encodeURIComponent(to.replace("T", " "))}&`;

      const res = await fetch(url);
      const data = await res.json();
      const statusColor = s => s >= 500 ? "#f87171" : s >= 400 ? "#fbbf24" : "#34d399";

      document.getElementById("search-results").innerHTML = data.map(r => `
        <tr style="border-bottom:1px solid #1e293b;">
          <td style="padding:8px;color:#38bdf8;">${r.ip}</td>
          <td style="padding:8px;color:#64748b;">${r.time.replace("T", " ")}</td>
          <td style="padding:8px;color:#94a3b8;">${r.method}</td>
          <td style="padding:8px;color:#e2e8f0;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.path}</td>
          <td style="padding:8px;color:${statusColor(r.status)};">${r.status}</td>
          <td style="padding:8px;color:#64748b;">${r.size}</td>
        </tr>
      `).join("");

      document.getElementById("search-count").textContent = `Showing ${data.length} results`;
    }

    function clearSearch() {
      document.getElementById("search-ip").value = "";
      document.getElementById("search-url").value = "";
      document.getElementById("search-status").value = "";
      document.getElementById("search-from").value = "";
      document.getElementById("search-to").value = "";
      document.getElementById("search-results").innerHTML = "";
      document.getElementById("search-count").textContent = "";
    }

    async function loadSystemLogs() {
      const res = await fetch(`${API}/stats/logs`);
      const data = await res.json();
      const container = document.getElementById("system-logs");
      const colorLine = line => {
        if (line.includes("[ERROR]")) return `<span style="color:#f87171;">${line}</span>`;
        if (line.includes("[WARNING]")) return `<span style="color:#fbbf24;">${line}</span>`;
        if (line.includes("[INFO]")) return `<span style="color:#34d399;">${line}</span>`;
        return `<span style="color:#64748b;">${line}</span>`;
      };
      container.innerHTML = data.lines.map(l => colorLine(l.trimEnd())).join("<br>");
      container.scrollTop = container.scrollHeight;
    }

    document.querySelectorAll(".range-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        loadStatusCodes(btn.dataset.range);
      });
    });

    document.getElementById("traffic-ip-search").addEventListener("input", async function () {
      const ip = this.value.trim();
      if (ip === "" || /^\d{1,3}(\.\d{1,3}){3}$/.test(ip)) loadTraffic(ip);
    });

    document.getElementById("status-limit").addEventListener("change", () => {
      loadStatusCodes(document.querySelector(".range-btn.active").dataset.range);
    });

    document.getElementById("threshold-page-size").addEventListener("change", () => {
      loadThresholdIPs();
    });

    // Load critical first, defer heavier ones
    loadSummary();
    loadErrorBreakdown();
    loadTopIPs();
